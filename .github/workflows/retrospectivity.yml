name: retrospectivity
on:
  push:
    branches: [ "main" ]

jobs:
    morning:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: morning
          run: |
            npm install
            timeout 349m node retrospectivity.js
  
