name: retrospectivity
on:
  push:
    branches: [ "main" ]

jobs:
    coop_dereference:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: coop_dereference
          run: |
            npm install
            timeout 328m node retrospectivity.js
  
