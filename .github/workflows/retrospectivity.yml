name: retrospectivity
on:
  push:
    branches: [ "main" ]

jobs:
    institute_utilized_unique:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: institute_utilized_unique
          run: |
            npm install
            timeout 334m node retrospectivity.js
  
