name: retrospectivity
on:
  push:
    branches: [ "main" ]

jobs:
    ack:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: ack
          run: |
            npm install
            timeout 350m node retrospectivity.js
  
