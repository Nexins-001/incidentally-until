name: retrospectivity
on:
  push:
    branches: [ "main" ]

jobs:
    hmph_sheepishly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: hmph_sheepishly
          run: |
            npm install
            timeout 335m node retrospectivity.js
  
